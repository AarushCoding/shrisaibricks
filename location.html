<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Sai Bricks | Order Form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <style>
        .hero {
            width: 100%;            /* Takes full width of the parent container */
            max-width: 1100px;      /* Matches your timeline/content width */
            margin: 2rem auto;      /* Centers it */
            padding: 0 5%;          /* Adds breathing room on mobile */
        }

        .hero iframe {
            width: 100%;            /* Spans the full width of the container */
            aspect-ratio: 16 / 9;   /* Maintains a cinematic shape on all screens */
            border-radius: 15px;    /* Matches your card style */
            border: 1px solid var(--glass);
        }

        @media (max-width: 768px) {
            .hero iframe {
                aspect-ratio: 4 / 3; /* Makes the map taller/squarer on mobile for easier navigation */
            }
        }
        :root {
            --primary: #e65100;
            --secondary: #263238;
            --accent: #ffb74d;
            --light: #f8f9fa;
            --dark: #101418;
            --glass: rgba(255, 255, 255, 0.05);
        }

        h1, h2, h3 {
            text-transform: none;
        }
        
        img {
            margin-top: 10px;
        }
        /* Updated Hero for Form alignment */
        .hero {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; /* Centered the form */
            padding: 100px 5%; /* Top padding for the fixed nav */
            background: linear-gradient(to bottom, rgba(16, 20, 24, 0.8), rgba(16, 20, 24, 0.95)),
                        url('https://images.unsplash.com/photo-1589939705384-5185138a04b9?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .form-container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 800px;
            width: 100%;
        }

        .form-container h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .brick-order-form {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.8rem;
            color: white;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.12);
        }

        /* Custom styling for Select dropdown arrow in dark mode */
        select option {
            background-color: var(--dark);
            color: white;
        }

        .contact-details {
            justify-content: center;
        }

        .maps-link {
            color: #ffffff;
            text-decoration-line: none;
            text-decoration: none;
            margin-top: 20px;
            font-weight: bold;
            font-size: 25px;
        }

        /* Responsive fix for form rows */
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .form-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><a href="index.html" style="color: var(--primary); text-decoration: none;">SHRI SAI BRICKS</a></div>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-btn">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="location.html">Location</a></li>
            <li><a href="order.html">Order</a></li>
        </ul>
    </nav>

    <section class="hero" id="home">
        <h1><span>Location</span></h1>
        <h3>We are located in Gulbarga, Karnataka, India</h3>
        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d18066.699401158334!2d76.81149594368279!3d17.378607044282507!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3bc8b92ab9d7f161%3A0xbaec0bef7e33e070!2sSHRI%20SAI%20BRICKS!5e1!3m2!1sen!2sin!4v1775208047132!5m2!1sen!2sin" style="margin-top:10px;border: 5;border-color: #e65100;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        <a href="https://maps.app.goo.gl/4fA1xPJPqYzgPSp4A" class="maps-link" target="_blank">Google Maps Link</a>
    </section>

    <footer id="contact">
        <div class="contact-info">
            <h2>GET IN TOUCH</h2>
            <p>Email: contact@shrisaibricks.com | Phone: +91 94800 00012</p>
            
        </div>
        <p style="font-size: 0.8rem; color: #666;">&copy; 2026 Shri Sai Bricks. All Rights Reserved.</p>
    </footer>

</body>
</html>
